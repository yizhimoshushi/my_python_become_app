name: Build Pygame APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # 修正点 1：这里必须用 setup-python 动作，而不是 upload-artifact
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool

      - name: Install Buildozer
        run: |
          pip3 install buildozer
          pip3 install cython

      - name: Build APK
        run: |
          # 1. 定义 SDK 路径变量，防止路径错误
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # 2. 创建 licenses 目录（如果不存在）
          mkdir -p $HOME/.android
          
          # 3. 【核心修复】使用 yes 命令自动接受所有 licenses
          # 这会模拟用户疯狂按 'y' 键，直到所有协议都被接受
          yes | sdkmanager --licenses
          
          # 4. 预安装 build-tools（防止 buildozer 再次询问）
          # 我们指定一个稳定的版本，比如 34.0.0 或 33.0.0
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34"
          
          # 5. 现在运行 buildozer，环境已经准备好了
          buildozer android debug p4a --package pgs4a
          
      # 修正点 2：这里必须升级到 @v4，否则会报 deprecated 错误
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-pygame-apk
          path: bin/*.apk

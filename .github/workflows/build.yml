name: Build Pygame APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # 修正点 1：这里必须用 setup-python 动作，而不是 upload-artifact
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool

      - name: Install Buildozer
        run: |
          pip3 install buildozer
          pip3 install cython

      - name: Build APK
        run: |
          # 1. 第一次运行 Buildozer
          # 这一步会触发 SDK 下载，但会卡在 License 协议上并报错退出
          # 我们加上 || true，让脚本即使报错也不要停止，继续往下执行
          echo "第一阶段：触发 SDK 下载（预期会失败）..."
          buildozer android debug p4a --package pgs4a || true
          
          # 2. 定义 SDK 路径
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          # 修正路径：新版 SDK 的 sdkmanager 在 lib/bin 下
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/lib/bin/sdkmanager"
          
          # 3. 检查 SDK 是否下载成功
          if [ ! -f "$SDK_MANAGER" ]; then
              echo "错误：SDK 下载失败，找不到 sdkmanager"
              exit 1
          fi
          
          # 4. 自动接受所有 License 协议
          echo "第二阶段：自动接受 License..."
          yes | $SDK_MANAGER --licenses
          
          # 5. 预安装必要的组件（防止 Buildozer 再次卡住）
          echo "第三阶段：预安装 Build Tools..."
          $SDK_MANAGER "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          # 6. 第二次运行 Buildozer
          # 现在环境已经准备好了，这次应该能顺利编译
          echo "第四阶段：正式编译..."
          buildozer android debug p4a --package pgs4a
          
      # 修正点 2：这里必须升级到 @v4，否则会报 deprecated 错误
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-pygame-apk
          path: bin/*.apk

name: Build Pygame APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          libltdl-dev \
          libffi-dev \
          unzip \
          wget \
          m4 \
          dos2unix

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Fix Spec File (Remove Deprecated Key)
      run: |
        # 修复日志中提示的弃用警告：android.bootstrap -> p4a.bootstrap
        # 同时确保换行符正确
        dos2unix buildozer.spec 2>/dev/null || true
        sed -i 's/^android.bootstrap/sdl2/#/g' buildozer.spec
        echo "p4a.bootstrap = sdl2" >> buildozer.spec
        
        # 强制设置 NDK 版本（根据日志推荐使用 28c）
        sed -i '/^android.ndk/d' buildozer.spec
        echo "android.ndk = 28c" >> buildozer.spec

    # --- 🔴 核心修复：手动安装 SDK 命令行工具 ---
    - name: Manual Install Android SDK
      run: |
        # 1. 创建 SDK 目录
        mkdir -p $HOME/.buildozer/android/platform/android-sdk
        
        # 2. 下载最新的命令行工具
        # 注意：2026年可能需要更新这个URL，这是目前的标准URL
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk-tools.zip
        
        # 3. 解压并移动到 SDK 目录
        unzip sdk-tools.zip -d $HOME/.buildozer/android/platform/android-sdk-temp
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        mv $HOME/.buildozer/android/platform/android-sdk-temp/cmdline-tools/* $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/ || true
        
        # 4. 清理临时文件
        rm -rf $HOME/.buildozer/android/platform/android-sdk-temp sdk-tools.zip

    # --- 🟢 必须步骤：接受 SDK 许可协议 ---
    - name: Accept SDK Licenses
      run: |
        mkdir -p $HOME/.android
        # 创建 repositories.cfg 防止警告
        touch $HOME/.android/repositories.cfg
        
        # 创建 licenses 目录并写入许可哈希
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        cat > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license << EOF
8933bad161af4178b1185d1a37fbf41ea5269c55
EOF

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug.apk
        path: bin/*.apk

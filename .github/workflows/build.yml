name: Build Pygame APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (with libltdl-dev fix)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          libltdl-dev \  # 关键：解决 LT_SYS_SYMBOL_USCORE 错误
          unzip \
          wget \
          m4

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Setup Android SDK and Build
      run: |
        # 清理可能冲突的环境变量
        unset ANDROID_SDK_ROOT
        unset ANDROID_NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        # 设置 ANDROID_HOME
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        echo "ANDROID_HOME is set to $ANDROID_HOME"
        echo "PATH is now $PATH"

        # 1. 下载并设置 SDK 命令行工具
        echo "Setting up Android SDK..."
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/sdk-tools.zip
        unzip -q /tmp/sdk-tools.zip -d /tmp/
        
        # 移动 cmdline-tools 到正确位置
        rm -rf cmdline-tools
        mv /tmp/cmdline-tools ./
        
        # 创建 latest 子目录并移动内容
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/bin cmdline-tools/latest/
        mv cmdline-tools/lib cmdline-tools/latest/

        # 2. 创建兼容的 tools 目录
        echo "Creating compatibility layer for Buildozer..."
        mkdir -p $ANDROID_HOME/tools/bin
        mkdir -p $ANDROID_HOME/tools/lib
        
        # 复制文件
        cp -r $ANDROID_HOME/cmdline-tools/latest/bin/* $ANDROID_HOME/tools/bin/
        cp -r $ANDROID_HOME/cmdline-tools/latest/lib/* $ANDROID_HOME/tools/lib/

        # 3. 验证 sdkmanager 路径
        echo "Looking for sdkmanager..."
        find $ANDROID_HOME -name "sdkmanager" -type f
        
        # 4. 接受协议
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

        # 5. 安装必要组件
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

        # 6. 返回项目根目录并开始构建
        cd $GITHUB_WORKSPACE
        echo "Current directory: $(pwd)"
        ls -la buildozer.spec
        
        # 关键：设置环境变量以解决 libffi autoconf 问题
        export ACLOCAL="aclocal -I /usr/share/aclocal"
        export AUTOCONF="autoconf"
        export AUTOMAKE="automake"
        export LIBTOOLIZE="libtoolize"
        
        echo "Starting Buildozer with verbose logging..."
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pygame-apk
        path: bin/*.apk

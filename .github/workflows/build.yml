name: Build Pygame APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          libltdl-dev \
          libffi-dev \
          unzip \
          wget \
          m4 \
          dos2unix

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Cache Buildozer Dependencies
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Sanitize buildozer.spec
      run: |
        # 1. 转换换行符
        dos2unix buildozer.spec 2>/dev/null || true

        # 2. 强制设置 NDK 版本
        # 先删除所有 android.ndk 行，再添加一个正确的，确保唯一性
        sed -i '/^android.ndk/d' buildozer.spec
        echo "android.ndk = 27c" >> buildozer.spec
        
        # 3. 验证结果
        echo "=== Final android.ndk configuration ==="
        grep "android.ndk" buildozer.spec
        count=$(grep -c "^android.ndk" buildozer.spec)
        if [ "$count" -ne 1 ]; then
          echo "ERROR: android.ndk count is $count, expected 1"
          exit 1
        fi

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug.apk
        path: bin/*.apk

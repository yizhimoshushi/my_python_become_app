name: Build Pygame APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good openjdk-17-jdk autoconf automake libtool libltdl-dev libffi-dev unzip wget m4

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Cache Android NDK
      id: cache-ndk
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer/android/platform/android-ndk-r23b
        key: ${{ runner.os }}-ndk-23b-${{ github.sha }}

    - name: Setup Android SDK and NDK
      run: |
        # 清理环境变量
        unset ANDROID_SDK_ROOT ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT
        
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        
        # 下载并解压 SDK 命令行工具
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/sdk.zip
        unzip -q /tmp/sdk.zip -d /tmp/
        rm -rf cmdline-tools && mv /tmp/cmdline-tools .
        mkdir -p cmdline-tools/latest && mv cmdline-tools/bin cmdline-tools/latest/ && mv cmdline-tools/lib cmdline-tools/latest/
        
        # 创建 tools 兼容目录
        mkdir -p $ANDROID_HOME/tools/bin $ANDROID_HOME/tools/lib
        cp -r cmdline-tools/latest/bin/* $ANDROID_HOME/tools/bin/
        cp -r cmdline-tools/latest/lib/* $ANDROID_HOME/tools/lib/
        
        # 接受协议
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # 安装必要组件
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        
        # 检查 NDK 是否已缓存
        if [ ! -d "$HOME/.buildozer/android/platform/android-ndk-r23b" ]; then
          echo "NDK not cached, downloading from Google official source..."
          
          # 从 Google 官方源下载 NDK r23b（正确链接）
          wget -O /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-r23b-linux.zip"
          
          # 验证下载
          if [ ! -f /tmp/ndk.zip ] || [ $(stat -c%s /tmp/ndk.zip) -lt 1000000 ]; then
            echo "Download failed or file too small, retrying..."
            wget -O /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-r23b-linux.zip"
          fi
          
          # 解压到正确位置
          mkdir -p $HOME/.buildozer/android/platform/
          unzip -q /tmp/ndk.zip -d $HOME/.buildozer/android/platform/
        else
          echo "NDK found in cache, skipping download"
        fi
        
        # 设置 NDK 环境变量
        export ANDROID_NDK=$HOME/.buildozer/android/platform/android-ndk-r23b
        echo "ANDROID_NDK=$ANDROID_NDK" >> $GITHUB_ENV

    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        
        # 验证 buildozer.spec 存在
        if [ ! -f buildozer.spec ]; then
          echo "Error: buildozer.spec not found!"
          exit 1
        fi
        
        # 构建
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pygame-apk
        path: bin/*.apk

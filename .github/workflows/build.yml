name: Build APK

on:
  # 可以设置为在 push 到 main 分支或打 tag 时触发
  push:
    branches: [ main ]
  # 或者手动在 Actions 页面触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04 # Buildozer 推荐使用 Ubuntu 20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9' # Buildozer 对 Python 3.9 兼容性较好

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y --no-install-recommends \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
          libssl-dev build-essential libglib2.0-dev libgtk-3-dev libgles2-mesa-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

    - name: Install Buildozer and Cython
      run: |
        pip3 install --user cython==0.29.33
        pip3 install --user buildozer

    - name: Initialize Buildozer (Optional, to generate .

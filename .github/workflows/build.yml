name: Build Pygame APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # 修正点 1：这里必须用 setup-python 动作，而不是 upload-artifact
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool

      - name: Install Buildozer
        run: |
          pip3 install buildozer
          pip3 install cython

      - name: Build APK
        run: |
          # 1. 定义路径变量
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # 2. 【手动下载】Android SDK 命令行工具
          # 如果目录不存在，我们就自己下载！
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
              echo "SDK 未找到，开始手动下载..."
              mkdir -p $ANDROID_HOME/cmdline-tools
              # 下载 Google 官方工具
              wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
              # 解压到正确的位置
              unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
              # 重命名文件夹以匹配 Buildozer 的预期结构
              mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          
          # 3. 定义 sdkmanager 的绝对路径
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          
          # 4. 【强制接受协议】
          echo "正在接受 Android SDK 许可协议..."
          yes | $SDK_MANAGER --licenses
          
          # 5. 【手动安装组件】
          # 直接安装 Buildozer 需要的核心组件
          echo "正在安装 Build Tools 和 Platform Tools..."
          $SDK_MANAGER "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          # 6. 【运行 Buildozer】
          # 现在环境已经完美准备好了
          echo "开始编译 APK..."
          buildozer android debug p4a --package pgs4a
          
      # 修正点 2：这里必须升级到 @v4，否则会报 deprecated 错误
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-pygame-apk
          path: bin/*.apk

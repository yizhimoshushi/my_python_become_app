name: Build Pygame APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # 修正点 1：这里必须用 setup-python 动作，而不是 upload-artifact
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool

      - name: Install Buildozer
        run: |
          pip3 install buildozer
          pip3 install cython

      - name: Build APK
        run: |
          # 1. 定义 SDK 根目录
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          
          # 2. 【关键修复】修正 sdkmanager 的路径
          # 新版本 SDK 把 sdkmanager 放在了 lib/bin 下，而不是 bin 下
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/lib/bin/sdkmanager"
          
          # 3. 创建 licenses 目录
          mkdir -p $HOME/.android
          
          # 4. 使用 yes 命令自动接受所有 licenses
          # 如果上面的路径不对，这里会报错，但我们先试试这个标准路径
          if [ -f "$SDK_MANAGER" ]; then
              echo "Found sdkmanager at $SDK_MANAGER"
              yes | $SDK_MANAGER --licenses
          else
              echo "Error: sdkmanager not found at $SDK_MANAGER"
              # 尝试找一下它到底在哪，方便调试
              find $ANDROID_HOME -name "sdkmanager"
          fi
          
          # 5. 预安装 build-tools (使用绝对路径调用)
          if [ -f "$SDK_MANAGER" ]; then
              $SDK_MANAGER "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          fi
          
          # 6. 运行 buildozer
          buildozer android debug p4a --package pgs4a
          
      # 修正点 2：这里必须升级到 @v4，否则会报 deprecated 错误
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-pygame-apk
          path: bin/*.apk

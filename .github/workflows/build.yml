name: Build Pygame APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # 修正点 1：这里必须用 setup-python 动作，而不是 upload-artifact
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool

      - name: Install Buildozer
        run: |
          pip3 install buildozer
          pip3 install cython

      - name: Build APK
        run: |
          # 1. 强制创建 licenses 目录并写入一个空的 license 文件
          # 这是绕过 sdkmanager 授权检查的常用技巧
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # 2. 关键步骤：直接生成一个已接受的 license 文件
          # 这样 sdkmanager 就不会要求交互了
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/android-sdk-license
          echo "d56f51875a5a82c6a55f59b6a5f5544e19915775" >> $HOME/.android/android-sdk-license
          
          # 3. 现在再运行 buildozer，就不会卡在授权上了
          buildozer android debug p4a --package pgs4a
          
      # 修正点 2：这里必须升级到 @v4，否则会报 deprecated 错误
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-pygame-apk
          path: bin/*.apk

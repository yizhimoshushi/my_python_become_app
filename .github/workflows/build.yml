name: Build Pygame APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          libltdl-dev \
          libffi-dev \
          unzip \
          wget \
          m4

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Cache Buildozer Dependencies
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Fix Line Endings (Optional)
      # 确保 spec 文件是 Unix 格式
      run: |
        sudo apt-get install -y dos2unix
        dos2unix buildozer.spec || true

    - name: Update NDK Version in Spec
      # 强制将 spec 文件中的 NDK 版本设为 r27c (满足最低 v25 要求)
      run: |
        if grep -q "android.ndk" buildozer.spec; then
          sed -i 's/android.ndk.*/android.ndk = 27c/g' buildozer.spec
        else
          echo "android.ndk = 27c" >> buildozer.spec
        fi
        # 显示确认
        grep "android.ndk" buildozer.spec

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug.apk
        path: bin/*.apk

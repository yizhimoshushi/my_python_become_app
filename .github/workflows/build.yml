name: Build Pygame APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          unzip \
          wget

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Setup Android SDK and Build
      run: |
        # 设置 ANDROID_HOME
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        echo "ANDROID_HOME is set to $ANDROID_HOME"
        echo "PATH is now $PATH"

        # 1. 下载并设置 SDK 命令行工具
        echo "Setting up Android SDK..."
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/sdk-tools.zip
        unzip -q /tmp/sdk-tools.zip -d /tmp/
        
        # 移动 cmdline-tools 到正确位置
        rm -rf cmdline-tools
        mv /tmp/cmdline-tools ./
        
        # 创建 latest 子目录并移动内容
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/bin cmdline-tools/latest/
        mv cmdline-tools/lib cmdline-tools/latest/

        # 2. 验证 sdkmanager 路径
        echo "Looking for sdkmanager..."
        find $ANDROID_HOME -name "sdkmanager" -type f
        
        # 3. 接受协议
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

        # 4. 安装必要组件
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

        # 5. 验证安装
        ls -la $ANDROID_HOME/platforms/
        ls -la $ANDROID_HOME/build-tools/

        # 6. 返回项目根目录并开始构建
        cd $GITHUB_WORKSPACE
        echo "Current directory: $(pwd)"
        ls -la buildozer.spec
        
        echo "Starting Buildozer..."
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pygame-apk
        path: bin/*.apk

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 更新了版本

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system dependencies
      # 修复点：确保 run 关键字前有正确的缩进
      run: |
        sudo apt update
        sudo apt install -y --no-install-recommends \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
          libssl-dev build-essential libglib2.0-dev libgtk-3-dev libgles2-mesa-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

    - name: Install Buildozer and Cython
      # 修复点：确保 run 关键字前有正确的缩进
      run: |
        pip3 install --user cython==0.29.33
        pip3 install --user buildozer

    - name: Build APK
      # 修复点：确保 run 关键字前有正确的缩进
      run: |
        # 优化点：将 spec 中的 android.ndk 改为 25b，避免 27c 的兼容性问题
        sed -i 's/android.ndk = 27c/android.ndk = 25b/g' buildozer.spec
        ~/.local/bin/buildozer -v android debug
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk

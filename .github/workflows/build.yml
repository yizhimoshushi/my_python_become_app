name: Build Pygame APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          libltdl-dev \
          libffi-dev \
          unzip \
          wget \
          m4 \
          dos2unix

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Cache Buildozer Dependencies
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Fix Line Endings & Update NDK
      # 1. 修正文件格式 2. 强制将 NDK 版本改为 27c
      run: |
        # 修正换行符，防止解析错误
        dos2unix buildozer.spec || true
        
        # 核心修复：使用 sed 查找包含 'android.ndk' 的行并替换整行为 'android.ndk = 27c'
        # 这样就不会产生重复项
        if grep -q "^android.ndk" buildozer.spec; then
          echo "Found existing android.ndk line. Updating it..."
          sed -i '/^android.ndk.*/c\android.ndk = 27c' buildozer.spec
        else
          echo "No android.ndk line found. Adding it..."
          echo "android.ndk = 27c" >> buildozer.spec
        fi
        
        # 打印结果供检查
        echo "--- Current buildozer.spec content around NDK ---"
        grep -A 2 -B 2 "android.ndk" buildozer.spec

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug.apk
        path: bin/*.apk
